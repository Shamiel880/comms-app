<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks - CommsPulse</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #334155;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
    }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    
    nav { display: flex; gap: 1.5rem; }
    
    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      transition: all 0.2s;
    }
    
    nav a:hover, nav a.active {
      color: var(--text-primary);
      background: var(--bg-secondary);
    }
    
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    
    .page-header h1 { font-size: 1.5rem; }
    
    .filters { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    
    .filter-btn {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
    }
    
    .task-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    
    .task-column {
      background: var(--bg-card);
      border-radius: 1rem;
      border: 1px solid var(--border);
      padding: 1.25rem;
    }
    
    .column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    
    .column-title {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .column-count {
      background: var(--bg-primary);
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    
    .task-list { display: flex; flex-direction: column; gap: 0.75rem; min-height: 200px; }
    
    .task-card {
      background: var(--bg-primary);
      border-radius: 0.75rem;
      padding: 1rem;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .task-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    
    .task-card.blocked { border-left: 3px solid var(--danger); }
    .task-card.in-progress { border-left: 3px solid var(--warning); }
    .task-card.done { border-left: 3px solid var(--success); opacity: 0.7; }
    
    .task-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.75rem;
    }
    
    .task-tag {
      padding: 0.125rem 0.5rem;
      border-radius: 0.25rem;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }
    
    .task-tag.project { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
    .task-tag.urgent { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .task-tag.channel { background: rgba(59, 130, 246, 0.2); color: var(--accent); }
    
    .task-assignee {
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }
    
    .empty {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    
    @media (max-width: 768px) {
      .container { padding: 1rem; }
      header { flex-direction: column; gap: 1rem; }
      nav { flex-wrap: wrap; justify-content: center; }
      .page-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">CommsPulse</div>
      <nav>
        <a href="/ui/">Dashboard</a>
        <a href="/ui/inbox.html">Inbox</a>
        <a href="/ui/tasks.html" class="active">Tasks</a>
        <a href="/ui/projects.html">Projects</a>
      </nav>
    </header>
    
    <div class="page-header">
      <h1>Tasks</h1>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="blocked">Blocked</button>
        <button class="filter-btn" data-filter="in-progress">In Progress</button>
        <button class="filter-btn" data-filter="todo">To Do</button>
        <button class="filter-btn" data-filter="done">Done</button>
      </div>
    </div>
    
    <div class="task-board" id="board">
      <div class="task-column">
        <div class="column-header">
          <span class="column-title">Blocked <span class="column-count" id="blocked-count">0</span></span>
        </div>
        <div class="task-list" id="blocked-tasks"></div>
      </div>
      <div class="task-column">
        <div class="column-header">
          <span class="column-title">In Progress <span class="column-count" id="progress-count">0</span></span>
        </div>
        <div class="task-list" id="progress-tasks"></div>
      </div>
      <div class="task-column">
        <div class="column-header">
          <span class="column-title">To Do <span class="column-count" id="todo-count">0</span></span>
        </div>
        <div class="task-list" id="todo-tasks"></div>
      </div>
      <div class="task-column">
        <div class="column-header">
          <span class="column-title">Done <span class="column-count" id="done-count">0</span></span>
        </div>
        <div class="task-list" id="done-tasks"></div>
      </div>
    </div>
  </div>
  
  <script>
    const API_BASE = window.location.origin;
    let currentFilter = 'all';
    let allTasks = [];
    
    async function loadTasks() {
      try {
        const res = await fetch(`${API_BASE}/api/tasks`);
        allTasks = await res.json();
        renderTasks();
      } catch (err) {
        console.error('Failed to load tasks:', err);
      }
    }
    
    function renderTasks() {
      const blocked = [];
      const inProgress = [];
      const todo = [];
      const done = [];
      
      let filtered = allTasks;
      if (currentFilter !== 'all') {
        filtered = allTasks.filter(t => t.status === currentFilter);
      }
      
      filtered.forEach(task => {
        switch (task.status) {
          case 'blocked': blocked.push(task); break;
          case 'in-progress': inProgress.push(task); break;
          case 'done': done.push(task); break;
          default: todo.push(task);
        }
      });
      
      renderColumn('blocked-tasks', blocked, 'blocked-count');
      renderColumn('progress-tasks', inProgress, 'progress-count');
      renderColumn('todo-tasks', todo, 'todo-count');
      renderColumn('done-tasks', done, 'done-count');
    }
    
    function renderColumn(containerId, tasks, countId) {
      const container = document.getElementById(containerId);
      document.getElementById(countId).textContent = tasks.length;
      
      if (tasks.length === 0) {
        container.innerHTML = '<div class="empty">No tasks</div>';
        return;
      }
      
      container.innerHTML = tasks.map(task => `
        <div class="task-card ${task.status}">
          <div class="task-title">${task.title || 'Untitled Task'}</div>
          <div class="task-meta">
            ${task.project ? `<span class="task-tag project">${task.project}</span>` : ''}
            ${task.priority === 'urgent' ? '<span class="task-tag urgent">Urgent</span>' : ''}
            ${task.source_channel ? `<span class="task-tag channel">${task.source_channel}</span>` : ''}
          </div>
          ${task.assignee ? `<div class="task-assignee">Assigned to: ${task.assignee}</div>` : ''}
        </div>
      `).join('');
    }
    
    // Setup filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.filter-btn.active')?.classList.remove('active');
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTasks();
      });
    });
    
    loadTasks();
    setInterval(loadTasks, 30000);
  </script>
</body>
</html>
