<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox - CommsPulse</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #334155;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
    }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    
    nav { display: flex; gap: 1.5rem; }
    
    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      transition: all 0.2s;
    }
    
    nav a:hover, nav a.active {
      color: var(--text-primary);
      background: var(--bg-secondary);
    }
    
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    
    .page-header h1 { font-size: 1.5rem; }
    
    .filters {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
    }
    
    .card {
      background: var(--bg-card);
      border-radius: 1rem;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    
    .message-list { min-height: 400px; }
    
    .message-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .message-item:hover { background: rgba(255, 255, 255, 0.02); }
    .message-item:last-child { border-bottom: none; }
    .message-item.unread { background: rgba(59, 130, 246, 0.05); }
    
    .message-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
      font-size: 1.125rem;
    }
    
    .message-avatar.email { background: #ef4444; }
    .message-avatar.whatsapp { background: #22c55e; }
    .message-avatar.telegram { background: #0ea5e9; }
    
    .message-content { flex: 1; min-width: 0; }
    
    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.375rem;
    }
    
    .message-sender {
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .message-time { font-size: 0.75rem; color: var(--text-secondary); }
    
    .message-subject {
      font-size: 0.9375rem;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    
    .message-preview {
      font-size: 0.875rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
    }
    
    .badge.urgent { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .badge.project { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
    
    .empty, .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }
    
    .empty code {
      background: var(--bg-primary);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.875rem;
    }
    
    @media (max-width: 768px) {
      .container { padding: 1rem; }
      header { flex-direction: column; gap: 1rem; }
      nav { flex-wrap: wrap; justify-content: center; }
      .page-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">CommsPulse</div>
      <nav>
        <a href="/ui/">Dashboard</a>
        <a href="/ui/inbox.html" class="active">Inbox</a>
        <a href="/ui/tasks.html">Tasks</a>
        <a href="/ui/projects.html">Projects</a>
      </nav>
    </header>
    
    <div class="page-header">
      <h1>Inbox</h1>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="email">Email</button>
        <button class="filter-btn" data-filter="whatsapp">WhatsApp</button>
        <button class="filter-btn" data-filter="telegram">Telegram</button>
        <button class="filter-btn" data-filter="urgent">Urgent</button>
      </div>
    </div>
    
    <div class="card">
      <div class="message-list" id="messages">
        <div class="loading">Loading messages...</div>
      </div>
    </div>
  </div>
  
  <script>
    const API_BASE = window.location.origin;
    let currentFilter = 'all';
    let allMessages = [];
    
    // Check URL params for initial filter
    const urlParams = new URLSearchParams(window.location.search);
    const channelParam = urlParams.get('channel');
    if (channelParam) {
      currentFilter = channelParam;
    }
    
    async function loadMessages() {
      try {
        const res = await fetch(`${API_BASE}/api/messages?limit=50`);
        allMessages = await res.json();
        renderMessages();
      } catch (err) {
        console.error('Failed to load messages:', err);
        document.getElementById('messages').innerHTML = '<div class="empty">Failed to load messages</div>';
      }
    }
    
    function renderMessages() {
      const container = document.getElementById('messages');
      
      let filtered = allMessages;
      if (currentFilter === 'urgent') {
        filtered = allMessages.filter(m => m.urgency === 'urgent');
      } else if (currentFilter !== 'all') {
        filtered = allMessages.filter(m => m.channel === currentFilter);
      }
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty">No messages found. Run <code>npm run simulate</code> to add test data.</div>';
        return;
      }
      
      container.innerHTML = filtered.map(msg => `
        <div class="message-item ${msg.read ? '' : 'unread'}">
          <div class="message-avatar ${msg.channel}">${(msg.sender || 'U')[0].toUpperCase()}</div>
          <div class="message-content">
            <div class="message-header">
              <span class="message-sender">
                ${msg.sender || 'Unknown'}
                ${msg.urgency === 'urgent' ? '<span class="badge urgent">Urgent</span>' : ''}
                ${msg.project ? `<span class="badge project">${msg.project}</span>` : ''}
              </span>
              <span class="message-time">${formatTime(msg.received_at)}</span>
            </div>
            <div class="message-subject">${msg.subject || '(No subject)'}</div>
            <div class="message-preview">${msg.body || ''}</div>
          </div>
        </div>
      `).join('');
    }
    
    function formatTime(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      return date.toLocaleDateString();
    }
    
    // Setup filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      if (btn.dataset.filter === currentFilter) {
        document.querySelector('.filter-btn.active')?.classList.remove('active');
        btn.classList.add('active');
      }
      
      btn.addEventListener('click', () => {
        document.querySelector('.filter-btn.active')?.classList.remove('active');
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderMessages();
      });
    });
    
    loadMessages();
    setInterval(loadMessages, 30000);
  </script>
</body>
</html>
