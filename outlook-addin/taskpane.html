<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LEMCO Tagger</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1729;
      color: #fff;
      padding: 12px;
    }
    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
    }
    .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
    }
    .tags {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
    }
    .tag-btn {
      padding: 7px 8px;
      border-radius: 8px;
      border: 0.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .tag-btn:hover { background: rgba(255,255,255,0.15); }
    .tag-btn.urgent  { border-color: rgba(239,68,68,0.5);  background: rgba(239,68,68,0.15); }
    .tag-btn.action  { border-color: rgba(59,130,246,0.5); background: rgba(59,130,246,0.15); }
    .tag-btn.fyi     { border-color: rgba(107,114,128,0.5);background: rgba(107,114,128,0.15);}
    .tag-btn.tender  { border-color: rgba(16,185,129,0.5); background: rgba(16,185,129,0.15); }
    .tag-btn.invoice { border-color: rgba(245,158,11,0.5); background: rgba(245,158,11,0.15); }
    .tag-btn.quote   { border-color: rgba(139,92,246,0.5); background: rgba(139,92,246,0.15); }
    .tag-btn.meeting { border-color: rgba(236,72,153,0.5); background: rgba(236,72,153,0.15); }
    .tag-btn.report  { border-color: rgba(107,114,128,0.5);background: rgba(107,114,128,0.15);}
    .tag-desc {
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
      font-weight: 400;
    }
    .site-section { margin-top: 4px; }
    .site-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .site-input {
      flex: 1;
      padding: 7px 8px;
      border-radius: 8px;
      border: 0.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 11px;
      outline: none;
    }
    .site-input::placeholder { color: rgba(255,255,255,0.3); }
    .site-input:focus { border-color: rgba(255,255,255,0.3); }
    .site-btn {
      padding: 7px 10px;
      border-radius: 8px;
      border: 0.5px solid rgba(16,185,129,0.5);
      background: rgba(16,185,129,0.15);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .status {
      margin-top: 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      min-height: 16px;
      text-align: center;
    }
    .status.success { color: #4ade80; }
    .status.error   { color: #f87171; }
  </style>
</head>
<body>

<div class="logo">LEMCO Priority OS</div>
<div class="label">Select a tag</div>

<div class="tags">
  <button class="tag-btn action"  onclick="insertTag('[ACTION]')">
    [ACTION]
    <div class="tag-desc">Someone must act</div>
  </button>
  <button class="tag-btn urgent"  onclick="insertTag('[URGENT]')">
    [URGENT]
    <div class="tag-desc">Same-day attention</div>
  </button>
  <button class="tag-btn fyi"     onclick="insertTag('[FYI]')">
    [FYI]
    <div class="tag-desc">No action needed</div>
  </button>
  <button class="tag-btn meeting" onclick="insertTag('[MEETING]')">
    [MEETING]
    <div class="tag-desc">Meeting request</div>
  </button>
  <button class="tag-btn tender"  onclick="insertTag('[TENDER]')">
    [TENDER]
    <div class="tag-desc">Tender or enquiry</div>
  </button>
  <button class="tag-btn invoice" onclick="insertTag('[INVOICE]')">
    [INVOICE]
    <div class="tag-desc">Invoice or payment</div>
  </button>
  <button class="tag-btn quote"   onclick="insertTag('[QUOTE]')">
    [QUOTE]
    <div class="tag-desc">Quote attached</div>
  </button>
  <button class="tag-btn report"  onclick="insertTag('[REPORT]')">
    [REPORT]
    <div class="tag-desc">Report attached</div>
  </button>
</div>

<div class="site-section">
  <div class="label">Site-specific</div>
  <div class="site-row">
    <input class="site-input" id="siteName" placeholder="Site name e.g. Atlantis" />
    <button class="site-btn" onclick="insertSiteTag()">Add</button>
  </div>
</div>

<div class="status" id="status"></div>

<script>
Office.onReady(() => {
  console.log('LEMCO Tagger ready');
});

function insertTag(tag) {
  Office.context.mailbox.item.subject.getAsync(result => {
    if (result.status !== Office.AsyncResultStatus.Succeeded) {
      showStatus('Could not read subject', 'error');
      return;
    }

    let current = result.value || '';

    // Remove any existing LEMCO tag first so you can swap tags cleanly
    current = current.replace(/\[(ACTION|FYI|URGENT|TENDER|INVOICE|QUOTE|MEETING|REPORT|SITE:[^\]]+)\]\s*/gi, '').trim();

    const newSubject = `${tag} ${current}`.trim();

    Office.context.mailbox.item.subject.setAsync(newSubject, result => {
      if (result.status === Office.AsyncResultStatus.Succeeded) {
        showStatus(`Tagged as ${tag}`, 'success');
      } else {
        showStatus('Failed to update subject', 'error');
      }
    });
  });
}

function insertSiteTag() {
  const siteName = document.getElementById('siteName').value.trim();
  if (!siteName) {
    showStatus('Enter a site name first', 'error');
    return;
  }
  insertTag(`[SITE:${siteName}]`);
  document.getElementById('siteName').value = '';
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = `status ${type}`;
  setTimeout(() => { el.textContent = ''; el.className = 'status'; }, 2500);
}
</script>
</body>
</html>
